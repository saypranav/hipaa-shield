<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIPAA Scanner Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-container {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE = 'http://localhost:8000';
        const scannerNames = {
            nmap: 'Network',
            nikto: 'Web Server',
            trufflehog: 'Credentials',
            code_sast: 'Code Analysis',
            openmrs_security: 'Security Logs',
            openmrs_app: 'App Logs',
            mysql_logs: 'DB Logs'
        };

        const ChatInterface = () => {
            const [messages, setMessages] = useState([
                { text: "Hello! I'm your HIPAA assistant. Ask me about your scan results or HIPAA requirements.", isBot: true }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;

                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { text: userMsg, isBot: false }]);
                setIsLoading(true);

                try {
                    const res = await fetch(`${API_BASE}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg })
                    });
                    const data = await res.json();
                    setMessages(prev => [...prev, { text: data.reply, isBot: true }]);
                } catch (err) {
                    setMessages(prev => [...prev, { text: "Sorry, I'm having trouble connecting to the server.", isBot: true }]);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div class="flex flex-col h-full bg-gray-50">
                    <div class="flex-1 p-4 overflow-y-auto space-y-4">
                        {messages.map((m, i) => (
                            <div key={i} class={`flex ${m.isBot ? 'justify-start' : 'justify-end'}`}>
                                <div class={`max-w-[85%] p-3 rounded-2xl shadow-sm ${
                                    m.isBot ? 'bg-white text-gray-800 border border-gray-100' : 'bg-green-600 text-white shadow-green-200'
                                }`}>
                                    <div class="text-xs font-bold uppercase tracking-widest opacity-50 mb-1">{m.isBot ? 'Advisor' : 'You'}</div>
                                    <div class="whitespace-pre-wrap text-sm leading-relaxed">{m.text}</div>
                                </div>
                            </div>
                        ))}
                        {isLoading && (
                            <div class="flex justify-start">
                                <div class="bg-white p-3 rounded-2xl shadow-sm text-gray-400 text-xs animate-pulse border border-gray-100">
                                    Analyzing compliance data...
                                </div>
                            </div>
                        )}
                    </div>
                    <form onSubmit={sendMessage} class="p-4 bg-white border-t border-gray-100 flex flex-col gap-3">
                        <textarea 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={(e) => {
                                if (e.key === 'Enter' && !e.shiftKey) {
                                    e.preventDefault();
                                    sendMessage(e);
                                }
                            }}
                            placeholder="Ask a compliance question..."
                            class="w-full bg-gray-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-green-500/20 focus:bg-white transition-all outline-none resize-none"
                            rows="3"
                        />
                        <div class="flex justify-end">
                            <button 
                                type="submit"
                                disabled={isLoading}
                                class="bg-green-600 text-white px-6 py-2.5 rounded-xl font-bold text-xs hover:bg-green-700 disabled:bg-gray-200 disabled:text-gray-400 transition-all shadow-lg shadow-green-200/50 flex items-center gap-2 active:scale-95"
                            >
                                {isLoading ? (
                                    <span class="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                                ) : '✨'}
                                Send Message
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const PolicyUploadCard = () => {
            const [file, setFile] = useState(null);
            const [status, setStatus] = useState('idle'); // idle, uploading, success

            const handleUpload = async () => {
                if (!file) return;
                setStatus('uploading');

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const res = await fetch(`${API_BASE}/upload-policy`, {
                        method: 'POST',
                        body: formData
                    });
                    if (!res.ok) {
                        const detail = await res.json().catch(() => ({}));
                        throw new Error(detail.detail || `${res.status} ${res.statusText}`);
                    }
                    setStatus('success');
                    setTimeout(() => { setStatus('idle'); setFile(null); }, 3000);
                } catch (err) {
                    setStatus('idle');
                    alert(`Upload failed: ${err.message}`);
                }
            };

            return (
                <div class="bg-white p-6 rounded-3xl border border-dashed border-blue-200 shadow-xl shadow-blue-50/50 flex flex-col group hover:border-blue-400 transition-all">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-gray-900">Security Policy</h3>
                        <span class={`text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter ${
                            status === 'uploading' ? 'bg-yellow-400 text-white animate-pulse' :
                            status === 'success' ? 'bg-green-500 text-white' : 'bg-blue-50 text-blue-500'
                        }`}>
                            {status === 'idle' ? 'PDF Required' : status}
                        </span>
                    </div>

                    <div class="relative flex-1 flex flex-col items-center justify-center border-2 border-dashed border-gray-100 rounded-2xl mb-4 p-4 hover:bg-gray-50 transition-colors cursor-pointer">
                        <input
                            type="file"
                            accept=".pdf"
                            onChange={(e) => setFile(e.target.files[0])}
                            class="absolute inset-0 opacity-0 cursor-pointer"
                        />
                        <div class="text-center">
                            <p class="text-2xl mb-1">{file ? '📄' : '📁'}</p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-tight">
                                {file ? file.name : 'Click to attach PDF policy'}
                            </p>
                        </div>
                    </div>

                    <button
                        onClick={handleUpload}
                        disabled={!file || status !== 'idle'}
                        class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold text-xs hover:bg-black disabled:bg-gray-100 disabled:text-gray-400 transition-all shadow-lg"
                    >
                        {status === 'uploading' ? 'Analyzing PDF...' : 'Upload for Analysis'}
                    </button>
                </div>
            );
        };

        const Dashboard = ({ user, onLogout }) => {
            const [scanners, setScanners] = useState({
                nmap: { status: 'idle', logs: [] },
                nikto: { status: 'idle', logs: [] },
                trufflehog: { status: 'idle', logs: [] },
                code_sast: { status: 'idle', logs: [] },
                openmrs_security: { status: 'idle', logs: [] },
                openmrs_app: { status: 'idle', logs: [] },
                mysql_logs: { status: 'idle', logs: [] }
            });
            const [report, setReport] = useState({ is_compliant: true, findings: [] });
            const [targetUrl, setTargetUrl] = useState('http://localhost:9901');
            const [showFindings, setShowFindings] = useState(false);
            const [scanError, setScanError] = useState('');

            // Permission Logic
            const canRunAudit = user.role === 'admin' || user.role === 'engineer';
            const canChangeTarget = user.role === 'admin';

            const runScan = async (id, openNewTab = true) => {
                if (!canRunAudit) return;
                try {
                    const res = await fetch(`${API_BASE}/scan/${id}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ target_url: targetUrl })
                    });
                    if (!res.ok) {
                        throw new Error(`Backend returned ${res.status} ${res.statusText}`);
                    }
                    setScanError('');
                    if (openNewTab) {
                        window.open(`?view=results&active=${id}&mode=single`, '_blank');
                    }
                } catch (err) {
                    console.error(err);
                    setScanError(`Could not start "${scannerNames[id] || id}" scan: ${err.message}. Is the backend running at ${API_BASE}?`);
                }
            };

            const runFullScan = () => {
                if (!canRunAudit) return;
                const all = ['nmap', 'nikto', 'trufflehog', 'code_sast', 'openmrs_security', 'openmrs_app', 'mysql_logs'];
                all.forEach(id => runScan(id, false));
                window.open('?view=results&active=nmap&mode=full', '_blank');
            };

            const updateStatus = async (id) => {
                try {
                    const res = await fetch(`${API_BASE}/scan/${id}/status`);
                    const data = await res.json();
                    setScanners(prev => ({ ...prev, [id]: data }));
                } catch (err) {
                    console.error(err);
                }
            };

            const fetchReport = async () => {
                try {
                    const res = await fetch(`${API_BASE}/report`);
                    const data = await res.json();
                    setReport(data);
                } catch (err) {
                    console.error(err);
                }
            };

            useEffect(() => {
                const interval = setInterval(() => {
                    Object.keys(scanners).forEach(id => updateStatus(id));
                    fetchReport();
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div class="min-h-screen bg-gray-50 flex flex-col">
                    {/* Top Navigation Bar */}
                    <nav class="bg-white border-b border-gray-200 px-8 py-4 sticky top-0 z-50 shadow-sm">
                        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div class="flex items-center gap-4">
                                <div class="bg-blue-600 p-2 rounded-lg text-white shadow-inner">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04m17.236 0 [rest of svg ...]"></path></svg>
                                </div>
                                <div>
                                    <h1 class="text-xl font-black text-gray-900 uppercase tracking-tighter">HIPAA <span class="text-blue-600">Shield</span></h1>
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none">Security Audit Engine</p>
                                </div>
                            </div>
                            
                            <div class="flex-1 max-w-2xl w-full">
                                <div class={`relative group ${!canChangeTarget && 'opacity-60'}`}>
                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                                        <span class="text-xs font-bold uppercase tracking-widest">Target</span>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={targetUrl}
                                        readOnly={!canChangeTarget}
                                        onChange={(e) => setTargetUrl(e.target.value)}
                                        class={`w-full pl-20 pr-4 py-3 border-none rounded-xl font-mono text-sm transition-all outline-none ${
                                            canChangeTarget 
                                            ? 'bg-gray-100 focus:ring-2 focus:ring-blue-500/20 focus:bg-white' 
                                            : 'bg-gray-50 cursor-not-allowed'
                                        }`}
                                        placeholder="http://hospital-system.local"
                                    />
                                    {!canChangeTarget && (
                                        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-1.5 px-2 py-1 bg-white rounded-lg shadow-sm border border-gray-100">
                                            <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Admin Restricted</span>
                                            <span class="text-xs">🔒</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div class="flex items-center gap-6">
                                <div class="flex flex-col items-end">
                                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest leading-none mb-1">{user.name}</p>
                                    <button onClick={onLogout} class="text-[10px] font-bold text-blue-600 hover:text-blue-800 uppercase tracking-tighter">Sign Out →</button>
                                </div>
                                <button 
                                    onClick={runFullScan}
                                    disabled={!canRunAudit || Object.values(scanners).some(s => s.status === 'running')}
                                    class="bg-gray-900 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-black disabled:bg-gray-100 disabled:text-gray-400 transition-all flex items-center gap-2 shadow-lg hover:shadow-gray-200"
                                >
                                    {Object.values(scanners).some(s => s.status === 'running') ? (
                                        <><span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Processing...</>
                                    ) : (
                                        <>{!canRunAudit && '🔒'} Run System Audit</>
                                    )}
                                </button>
                                <div class={`w-3 h-3 rounded-full ${report.is_compliant ? 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.5)]' : 'bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.5)] animate-pulse'}`}></div>
                            </div>
                        </div>
                    </nav>

                    {scanError && (
                        <div class="max-w-[1600px] w-full mx-auto px-8 pt-4">
                            <div class="bg-red-50 border border-red-200 text-red-800 px-5 py-3 rounded-xl flex justify-between items-center shadow-sm">
                                <div class="flex items-center gap-3">
                                    <span class="text-lg">⚠️</span>
                                    <span class="text-sm font-medium">{scanError}</span>
                                </div>
                                <button onClick={() => setScanError('')} class="text-red-600 hover:text-red-800 text-lg leading-none px-2">✕</button>
                            </div>
                        </div>
                    )}

                    <main class="flex-1 max-w-[1600px] w-full mx-auto p-8 flex flex-col lg:flex-row gap-8">
                        {/* Main Content Area */}
                        <div class="flex-1 space-y-8">
                            {/* Stats Summary */}
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <button 
                                    onClick={() => !report.is_compliant && setShowFindings(!showFindings)}
                                    class={`text-left p-4 rounded-2xl border transition-all ${
                                        report.is_compliant 
                                        ? 'bg-white border-gray-100 shadow-sm cursor-default' 
                                        : 'bg-white border-red-100 shadow-md hover:shadow-lg active:scale-[0.98]'
                                    }`}
                                >
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Compliance Status</p>
                                    <div class="flex justify-between items-end">
                                        <p class={`text-lg font-bold ${report.is_compliant ? 'text-green-600' : 'text-red-600'}`}>
                                            {report.is_compliant ? 'Fully Compliant' : `${report.findings.length} Vulnerabilities`}
                                        </p>
                                        {!report.is_compliant && (
                                            <span class="text-[10px] font-bold text-red-400 uppercase tracking-tighter">
                                                {showFindings ? 'Hide Details ↑' : 'View Details ↓'}
                                            </span>
                                        )}
                                    </div>
                                </button>
                                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Active Monitors</p>
                                    <p class="text-lg font-bold text-gray-900">6 Core Modules</p>
                                </div>
                                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">System Health</p>
                                    <p class="text-lg font-bold text-blue-600">Active</p>
                                </div>
                            </div>

                            {/* Vulnerabilities Detail List */}
                            {showFindings && !report.is_compliant && (
                                <div class="bg-white rounded-3xl border border-red-100 shadow-2xl overflow-hidden animate-in fade-in slide-in-from-top-4 duration-300">
                                    <div class="bg-red-600 px-6 py-4 flex justify-between items-center">
                                        <div>
                                            <h3 class="text-white font-bold text-sm uppercase tracking-widest">Detected HIPAA Violations</h3>
                                            <p class="text-red-200 text-[10px] font-medium uppercase tracking-tighter">Real-time audit findings</p>
                                        </div>
                                        <button onClick={() => setShowFindings(false)} class="text-white opacity-60 hover:opacity-100 transition-opacity p-2">✕</button>
                                    </div>
                                    <div class="p-6 space-y-4 max-h-[500px] overflow-y-auto bg-gray-50/50">
                                        {report.findings.map((f, i) => (
                                            <div key={i} class="group p-5 bg-white rounded-2xl border border-gray-100 hover:border-red-200 transition-all shadow-sm">
                                                <div class="flex justify-between items-start mb-3">
                                                    <span class="text-[10px] font-black text-red-600 bg-red-50 px-2.5 py-1 rounded-lg uppercase tracking-wider border border-red-100">{f.citation}</span>
                                                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{scannerNames[f.scanner]} Discovery</span>
                                                </div>
                                                <h4 class="font-bold text-gray-900 mb-1.5 text-base">{f.title}</h4>
                                                <p class="text-sm text-gray-600 leading-relaxed mb-4">{f.description}</p>
                                                <div class="flex items-center gap-2 p-2 bg-gray-50 rounded-lg border border-gray-100">
                                                    <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                                                    <span class="text-[10px] font-mono text-gray-500 font-bold uppercase">Evidence Trigger: {f.keyword}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* External Auditing Grid */}
                            <div>
                                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                                    <span class="w-8 h-[1px] bg-gray-200"></span> External Auditing Modules
                                </h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mb-12">
                                    <PolicyUploadCard />
                                    {['nmap', 'nikto', 'trufflehog', 'code_sast'].map(id => (
                                        <div key={id} class="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl shadow-gray-200/50 flex flex-col group hover:border-blue-200 transition-all">
                                            <div class="flex justify-between items-center mb-6">
                                                <h3 class="text-lg font-bold text-gray-900">{scannerNames[id]}</h3>
                                                <span class={`text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter ${
                                                    scanners[id].status === 'running' ? 'bg-yellow-400 text-white animate-pulse' :
                                                    scanners[id].status === 'completed' ? 'bg-green-500 text-white' :
                                                    scanners[id].status === 'failed' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-400'
                                                }`}>
                                                    {scanners[id].status}
                                                </span>
                                            </div>
                                            <p class="text-xs text-gray-500 leading-relaxed mb-8 h-8">
                                                {id === 'nmap' ? 'Port analysis & service finger-printing.' :
                                                 id === 'nikto' ? 'Web configuration & header auditing.' :
                                                 id === 'trufflehog' ? 'Sensitive credential & secret discovery.' :
                                                 'Source code SQLi & XSS vulnerability scanning.'}
                                            </p>
                                            <div class="flex gap-2 mt-auto">
                                                <button 
                                                    onClick={() => runScan(id)}
                                                    disabled={!canRunAudit || scanners[id].status === 'running'}
                                                    class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs hover:bg-blue-700 disabled:bg-gray-100 disabled:text-gray-400 transition-all shadow-lg shadow-blue-200"
                                                >
                                                    {!canRunAudit && '🔒'} {id.startsWith('openmrs') || id === 'mysql_logs' ? 'Fetch Logs' : 'Run Scan'}
                                                </button>
                                                <button 
                                                    onClick={() => window.open(`?view=results&active=${id}&mode=single`, '_blank')}
                                                    class="px-4 bg-white text-gray-700 border border-gray-200 rounded-xl font-bold text-xs hover:bg-gray-50 transition-all"
                                                >
                                                    Results
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* System Logs Grid */}
                            <div>
                                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                                    <span class="w-8 h-[1px] bg-gray-200"></span> System Created Logs
                                </h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                    {['openmrs_security', 'openmrs_app', 'mysql_logs'].map(id => (
                                        <div key={id} class="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl shadow-gray-200/50 flex flex-col group hover:border-blue-200 transition-all">
                                            <div class="flex justify-between items-center mb-6">
                                                <h3 class="text-lg font-bold text-gray-900">{scannerNames[id]}</h3>
                                                <span class={`text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter ${
                                                    scanners[id].status === 'running' ? 'bg-yellow-400 text-white animate-pulse' :
                                                    scanners[id].status === 'completed' ? 'bg-green-500 text-white' :
                                                    scanners[id].status === 'failed' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-400'
                                                }`}>
                                                    {scanners[id].status}
                                                </span>
                                            </div>
                                            <p class="text-xs text-gray-500 leading-relaxed mb-8 h-8">
                                                {id === 'openmrs_security' ? 'Login monitoring & access attempts.' :
                                                 id === 'openmrs_app' ? 'OpenMRS system & error analytics.' :
                                                 'MySQL database integrity & transactions.'}
                                            </p>
                                            <div class="flex gap-2 mt-auto">
                                                <button 
                                                    onClick={() => runScan(id)}
                                                    disabled={!canRunAudit || scanners[id].status === 'running'}
                                                    class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs hover:bg-blue-700 disabled:bg-gray-100 disabled:text-gray-400 transition-all shadow-lg shadow-blue-200"
                                                >
                                                    {!canRunAudit && '🔒'} {id.startsWith('openmrs') || id === 'mysql_logs' ? 'Fetch Logs' : 'Run Scan'}
                                                </button>
                                                <button 
                                                    onClick={() => window.open(`?view=results&active=${id}&mode=single`, '_blank')}
                                                    class="px-4 bg-white text-gray-700 border border-gray-200 rounded-xl font-bold text-xs hover:bg-gray-50 transition-all"
                                                >
                                                    Results
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Sidebar */}
                        <aside class="w-full lg:w-[400px] flex flex-col gap-6">
                            <div class="bg-white rounded-3xl border border-gray-100 shadow-2xl shadow-gray-200/50 overflow-hidden flex flex-col h-[700px] sticky top-24">
                                <div class="bg-gray-900 p-6 flex justify-between items-center">
                                    <div>
                                        <h2 class="text-white font-bold text-sm uppercase tracking-widest flex items-center gap-2">
                                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Advisor
                                        </h2>
                                        <p class="text-gray-500 text-[10px] font-medium uppercase tracking-tighter">AI Compliance Assistant</p>
                                    </div>
                                    <div class="text-2xl">🤖</div>
                                </div>
                                <div class="flex-1 overflow-hidden">
                                    <ChatInterface />
                                </div>
                            </div>
                        </aside>
                    </main>
                </div>
            );
        };

        const ResultsPage = () => {
            const query = new URLSearchParams(window.location.search);
            const initialTab = query.get('active') || 'nmap';
            const mode = query.get('mode') || 'full';
            
            const [scanners, setScanners] = useState({
                nmap: { status: 'idle', logs: [] },
                nikto: { status: 'idle', logs: [] },
                trufflehog: { status: 'idle', logs: [] },
                code_sast: { status: 'idle', logs: [] },
                openmrs_security: { status: 'idle', logs: [] },
                openmrs_app: { status: 'idle', logs: [] },
                mysql_logs: { status: 'idle', logs: [] }
            });
            const [report, setReport] = useState({ is_compliant: true, findings: [] });
            const [activeTab, setActiveTab] = useState(initialTab);

            useEffect(() => {
                const interval = setInterval(async () => {
                    try {
                        const fetchStatus = async (id) => {
                            const res = await fetch(`${API_BASE}/scan/${id}/status`);
                            return res.json();
                        };
                        
                        const nmap = await fetchStatus('nmap');
                        const nikto = await fetchStatus('nikto');
                        const trufflehog = await fetchStatus('trufflehog');
                        const sast = await fetchStatus('code_sast');
                        const sec = await fetchStatus('openmrs_security');
                        const app = await fetchStatus('openmrs_app');
                        const db = await fetchStatus('mysql_logs');
                        
                        setScanners({ nmap, nikto, trufflehog, code_sast: sast, openmrs_security: sec, openmrs_app: app, mysql_logs: db });

                        const repRes = await fetch(`${API_BASE}/report`);
                        const repData = await repRes.json();
                        setReport(repData);
                    } catch (err) {
                        console.error(err);
                    }
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            const filteredFindings = mode === 'single' 
                ? report.findings.filter(f => f.scanner === activeTab)
                : report.findings;

            return (
                <div class="container mx-auto p-8">
                    <header class="mb-8 flex justify-between items-center">
                        <h1 class="text-3xl font-bold text-gray-800">
                            {mode === 'single' ? `${scannerNames[activeTab]} Scan Results` : 'Full System Scan Results'}
                        </h1>
                        <button onClick={() => window.close()} class="text-blue-600 hover:underline">← Back to Dashboard</button>
                    </header>

                    <div class="bg-white rounded-lg shadow-md mb-8 overflow-hidden">
                        {mode !== 'single' && (
                            <div class="flex border-b bg-gray-50">
                                {Object.keys(scanners).map(id => (
                                    <button 
                                        key={id}
                                        onClick={() => setActiveTab(id)}
                                        class={`px-6 py-4 font-semibold uppercase flex items-center gap-2 ${activeTab === id ? 'bg-white border-t-2 border-blue-600 text-blue-600' : 'text-gray-500'}`}
                                    >
                                        {scannerNames[id]}
                                        {scanners[id].status === 'running' && <span class="w-2 h-2 bg-yellow-400 rounded-full animate-ping"></span>}
                                    </button>
                                ))}
                            </div>
                        )}
                        <div class="p-4 bg-black">
                            <div class="flex justify-between items-center mb-2 px-2">
                                <span class="text-xs text-gray-400 font-mono uppercase tracking-widest">{scannerNames[activeTab]} Console</span>
                                <span class="text-xs text-green-500 font-mono">{scanners[activeTab].status}</span>
                            </div>
                            <div class="log-container h-[500px]">
                                {scanners[activeTab].logs.length > 0 
                                    ? scanners[activeTab].logs.map((line, i) => <div key={i}>{line}</div>)
                                    : <div class="text-gray-500 italic">Waiting for logs...</div>
                                }
                            </div>
                        </div>
                    </div>

                    {filteredFindings.length > 0 && (
                        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-red-500 mb-8">
                            <h2 class="text-2xl font-bold text-red-600 mb-4">
                                {mode === 'single' ? `Compliance Findings for ${scannerNames[activeTab]}` : 'Consolidated Compliance Report'}
                            </h2>
                            <div class="space-y-4">
                                {filteredFindings.map((f, i) => (
                                    <div key={i} class="p-4 bg-red-50 border border-red-200 rounded">
                                        <div class="flex justify-between items-start mb-2">
                                            <span class="font-bold text-red-700">{f.citation} - {f.title}</span>
                                            {mode !== 'single' && <span class="text-xs bg-red-200 px-2 py-1 rounded uppercase">{scannerNames[f.scanner] || f.scanner}</span>}
                                        </div>
                                        <p class="text-sm text-gray-700 mb-2">{f.description}</p>
                                        <div class="text-xs font-mono text-red-500">Evidence found in logs for: {f.keyword}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    
                    {filteredFindings.length === 0 && (mode === 'single' ? scanners[activeTab].status === 'completed' : Object.values(scanners).every(s => s.status === 'completed')) && (
                        <div class="bg-green-100 p-8 rounded-lg text-center border-2 border-green-200">
                            <div class="text-5xl mb-4">✅</div>
                            <h2 class="text-2xl font-bold text-green-800">No HIPAA Violations Detected</h2>
                            <p class="text-green-700">The audited {mode === 'single' ? scannerNames[activeTab].toLowerCase() + ' section' : 'system'} is currently compliant with monitored controls.</p>
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = ({ onLogin }) => {
            const roles = [
                { id: 'auditor', name: 'Compliance Auditor', desc: 'Read-only access to findings and logs.', icon: '📋' },
                { id: 'engineer', name: 'Security Engineer', desc: 'Can trigger scans and view live logs.', icon: '🛠️' },
                { id: 'admin', name: 'System Administrator', desc: 'Full control over targets and audits.', icon: '🔑' }
            ];

            return (
                <div class="min-h-screen bg-gray-900 flex items-center justify-center p-6">
                    <div class="max-w-md w-full">
                        <div class="text-center mb-10">
                            <h1 class="text-4xl font-black text-white uppercase tracking-tighter mb-2">HIPAA <span class="text-blue-600">Shield</span></h1>
                            <p class="text-gray-400 text-xs font-black tracking-[0.3em] uppercase">Enterprise Access Gateway</p>
                        </div>
                        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
                            <div class="p-8">
                                <h2 class="text-xl font-bold text-gray-900 mb-6 text-center text-xs uppercase tracking-widest opacity-40">Select Access Level</h2>
                                <div class="space-y-3">
                                    {roles.map(role => (
                                        <button 
                                            key={role.id}
                                            onClick={() => onLogin({ role: role.id, name: role.name })}
                                            class="w-full group p-4 border border-gray-100 rounded-2xl text-left hover:border-blue-500 hover:bg-blue-50 transition-all active:scale-95"
                                        >
                                            <div class="flex items-center gap-4">
                                                <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-xl group-hover:bg-white shadow-sm transition-colors">
                                                    {role.icon}
                                                </div>
                                                <div>
                                                    <p class="font-bold text-gray-900 leading-tight">{role.name}</p>
                                                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">{role.desc}</p>
                                                </div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div class="bg-gray-50 p-6 border-t border-gray-100 text-center">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Secured by Gemini AI Intelligence</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const query = new URLSearchParams(window.location.search);
            const view = query.get('view');
            
            if (view === 'results') {
                return <ResultsPage />;
            }

            if (!user) {
                return <LoginPage onLogin={setUser} />;
            }

            return <Dashboard user={user} onLogout={() => setUser(null)} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
